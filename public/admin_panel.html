<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NUPAC Admin Panel</title>

  <!-- Bootstrap & FontAwesome -->
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet"/>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      padding-top: 70px;
    }

    .navbar-custom {
      background-color: #0056b3;
    }

    .navbar-custom .navbar-brand,
    .navbar-custom .nav-link {
      color: #fff;
    }

    .navbar-custom .nav-link:hover {
      color: #ffd700;
    }

    .card {
      margin-bottom: 30px;
    }

    table th {
      background-color: #007bff;
      color: white;
    }

    .btn {
      font-size: 14px;
    }

    .form-control {
      margin-bottom: 10px;
    }

    .footer {
      text-align: center;
      padding: 20px 0;
    }

    .pagination {
      justify-content: center;
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">NUPAC</a>
    <button class="navbar-toggler" data-toggle="collapse" data-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        <li class="nav-item"><button class="btn btn-info ml-2" id="toggle-upload"><i class="fas fa-upload"></i> Upload</button></li>
        <li class="nav-item"><a class="btn btn-danger ml-2 fas fa-logout p-2" id="logout-btn">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main Container -->
<div class="container">
  <div class="card" id="upload-section">
    <div class="card-header"><h2>Upload Document</h2></div>
    <div class="card-body">
      <form id="upload-form">
        <input type="text" id="title" class="form-control" placeholder="Title" required />
        <input type="text" id="subject_name" class="form-control" placeholder="Subject Name" required />
        <input type="text" id="course_name" class="form-control" placeholder="Course Code" required />
        <input type="text" id="link" class="form-control" placeholder="Link" required />
        <button type="submit" class="btn btn-primary btn-block">Upload</button>
      </form>
    </div>
  </div>
</div>

<!-- Search & Table Section -->
<div id="search-and-table" style="margin-left: 20px; margin-right: 20px;">
  <!-- Search -->
  <input type="text" id="search" class="form-control mb-3" placeholder="Search documents...">

  <!-- Document Table -->
  <div class="card ml-auto">
    <div class="card-header"><h2>Uploaded Documents</h2></div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-bordered table-striped">
          <thead>
            <tr>
              <th>Title</th>
              <th>Subject</th>
              <th>Course Code</th>
              <th>Link</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="document-list"></tbody>
        </table>
        <!-- Pagination -->
        <nav>
          <ul class="pagination" id="pagination"></ul>
        </nav>
      </div>
    </div>
  </div>
</div>

<!-- Toast Notifications -->
<div class="position-fixed bottom-0 right-0 p-3" style="z-index: 5; right: 0; bottom: 0;">
  <div id="liveToast" class="toast hide" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="toast-header">
      <strong class="mr-auto" id="toast-title">Notification</strong>
      <button type="button" class="ml-2 mb-1 close" data-dismiss="toast" aria-label="Close">
        <span aria-hidden="true">&times;</span>
      </button>
    </div>
    <div class="toast-body" id="toast-message"></div>
  </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Edit Document</h5>
        <button type="button" class="close" data-dismiss="modal" aria-label="Close">
          <span aria-hidden="true">&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form id="edit-form">
          <input type="text" id="edit-title" class="form-control" placeholder="Title" required />
          <input type="text" id="edit-subject_name" class="form-control" placeholder="Subject Name" required />
          <input type="text" id="edit-course_name" class="form-control" placeholder="Course Code" required />
          <input type="text" id="edit-link" class="form-control" placeholder="Link" required />
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="save-changes">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer fixed-bottom w-100">
  <p>© 2025 NUPAC</p>
  <p>
    <a class="btn btn-success" href="https://whatsapp.com/channel/0029Vaq4PTdKLaHmfpuSU81P"><i class="fab fa-whatsapp"></i></a>
    <a class="btn btn-danger" href="https://www.instagram.com/nup_affiliated_colleges?igsh=M2U5ZjR1anJxYWxq"><i class="fab fa-instagram"></i></a>
    <a class="btn btn-primary" href="https://facebook.com/groups/945505587706960/"><i class="fab fa-facebook-f"></i></a>
  </p>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  const apiBaseUrl = 'https://nupac.koyeb.app/api/todos';
  const itemsPerPage = 5;
  let allDocs = [];
  let currentPage = 1;
  let currentDocId = null;

  // Redirect if not logged in
  if (sessionStorage.getItem('logged_in') !== 'true') {
    window.location.href = 'admin_login.html';
  }

  $(document).ready(function () {
    // Fetch documents and render table
    fetchDocuments();

    // Search documents
    $('#search').on('keyup', function () {
      const keyword = $(this).val().toLowerCase();
      const filteredDocs = allDocs.filter(doc =>
        Object.values(doc).some(value =>
          String(value).toLowerCase().includes(keyword)
        )
      );
      currentPage = 1;
      renderTable(filteredDocs);
      renderPagination(filteredDocs.length);
    });

    // Edit document form handling
    $('#save-changes').on('click', function () {
      const updatedTitle = $('#edit-title').val();
      const updatedSubject = $('#edit-subject_name').val();
      const updatedCourse = $('#edit-course_name').val();
      const updatedLink = $('#edit-link').val();

      // Send updated data to API
      fetch(`${apiBaseUrl}/${currentDocId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title: updatedTitle, subject_name: updatedSubject, course_name: updatedCourse, link: updatedLink })
      })
      .then(res => res.json())
      .then(() => {
        $('#editModal').modal('hide');
        showToast('Success', 'Document updated successfully');
        fetchDocuments();
      })
      .catch(error => {
        $('#editModal').modal('hide');
        showToast('Error', error.message || 'Failed to update document', true);
      });
    });
  });

  function fetchDocuments() {
    fetch(apiBaseUrl)
      .then(res => res.json())
      .then(res => {
        allDocs = res.data;
        renderTable(allDocs);
        renderPagination(allDocs.length);
      })
      .catch(error => console.error('Error fetching documents:', error));
  }

  function renderTable(docs) {
    const list = $('#document-list');
    list.empty();
    const start = (currentPage - 1) * itemsPerPage;
    const paginatedDocs = docs.slice(start, start + itemsPerPage);
    paginatedDocs.forEach(doc => {
      list.append(`
        <tr>
          <td>${doc.title}</td>
          <td>${doc.subject_name}</td>
          <td>${doc.course_name}</td>
          <td><a href="${doc.link}" target="_blank">View</a></td>
          <td>
            <button class="btn btn-warning btn-sm" onclick="openEditModal(${doc.id})">Edit</button>
            <button class="btn btn-danger btn-sm" onclick="deleteDocument(${doc.id})">Delete</button>
          </td>
        </tr>
      `);
    });
  }

  function openEditModal(id) {
    currentDocId = id;
    const doc = allDocs.find(d => d.id === id);
    $('#edit-title').val(doc.title);
    $('#edit-subject_name').val(doc.subject_name);
    $('#edit-course_name').val(doc.course_name);
    $('#edit-link').val(doc.link);
    $('#editModal').modal('show');
  }

  function showToast(title, message, isError = false) {
    $('#toast-title').text(title);
    $('#toast-message').text(message);
    $('#liveToast').removeClass('bg-danger');
    if (isError) {
      $('#liveToast').addClass('bg-danger text-white');
    }
    $('.toast').toast('show');
  }

  function renderPagination(totalItems) {
    const totalPages = Math.ceil(totalItems / itemsPerPage);
    const pagination = $('#pagination');
    pagination.empty();

    for (let i = 1; i <= totalPages; i++) {
      pagination.append(`
        <li class="page-item ${i === currentPage ? 'active' : ''}">
          <a class="page-link" href="#" onclick="changePage(${i})">${i}</a>
        </li>
      `);
    }
  }

  function changePage(pageNumber) {
    if (pageNumber < 1 || pageNumber > Math.ceil(allDocs.length / itemsPerPage)) return;
    currentPage = pageNumber;
    renderTable(allDocs);
    renderPagination(allDocs.length);
  }

  function deleteDocument(id) {
    if (confirm('Are you sure you want to delete this document?')) {
      fetch(`${apiBaseUrl}/${id}`, { method: 'DELETE' })
        .then(res => res.json())
        .then(() => {
          showToast('Success', 'Document deleted successfully');
          fetchDocuments();
        })
        .catch(error => {
          showToast('Error', error.message || 'Failed to delete document', true);
        });
    }
  }
</script>

</body>
</html>
