<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NUPAC Admin Panel</title>

  <!-- Bootstrap & Icons -->
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet"/>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
      padding-top: 70px;
    }

    .navbar-custom {
      background-color: #0056b3;
    }

    .navbar-custom .navbar-brand,
    .navbar-custom .nav-link {
      color: #fff;
    }

    .navbar-custom .nav-link:hover {
      color: #ffd700;
    }

    .card {
      margin-bottom: 30px;
    }

    table th {
      background-color: #007bff;
      color: white;
    }

    .btn {
      font-size: 14px;
    }

    .form-control {
      margin-bottom: 10px;
    }

    .footer {
      text-align: center;
      padding: 20px 0;
    }

    @media (max-width: 768px) {
      .navbar-brand, .nav-link {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-custom fixed-top">
  <div class="container">
    <a class="navbar-brand" href="#">NUPAC</a>
    <button class="navbar-toggler" data-toggle="collapse" data-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
        <li class="nav-item"><a class="nav-link" href="#">Contact</a></li>
        <li class="nav-item"><a class="btn btn-danger ml-2" id="logout-btn">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- Main Container -->
<div class="container">
  <h1 class="text-center">Upload Section</h1>

  <!-- Upload Form -->
  <div class="card">
    <div class="card-header"><h2>Upload Document</h2></div>
    <div class="card-body">
      <form id="upload-form">
        <input type="text" id="title" class="form-control" placeholder="Title" required />
        <input type="text" id="subject_name" class="form-control" placeholder="Subject Name" required />
        <input type="text" id="course_name" class="form-control" placeholder="Course Code" required />
        <input type="text" id="link" class="form-control" placeholder="Link" required />
        <button type="submit" class="btn btn-primary btn-block">Upload</button>
      </form>
    </div>
  </div>

  <!-- Search -->
  <input type="search" id="search" class="form-control mb-3" placeholder="Search documents...">

  <!-- Document Table -->
  <div class="card">
    <div class="card-header"><h2>Uploaded Documents</h2></div>
    <div class="card-body">
      <div class="table-responsive">
        <table class="table table-bordered table-striped">
          <thead>
            <tr>
              <th>Title</th>
              <th>Subject</th>
              <th>Course Code</th>
              <th>Link</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="document-list"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Footer -->
<div class="footer">
  <p>© 2025 NUPAC</p>
  <p>
    <a class="btn btn-success" href="https://whatsapp.com/channel/0029Vaq4PTdKLaHmfpuSU81P"><i class="fab fa-whatsapp"></i></a>
    <a class="btn btn-danger" href="https://www.instagram.com/nup_affiliated_colleges?igsh=M2U5ZjR1anJxYWxq"><i class="fab fa-instagram"></i></a>
    <a class="btn btn-primary" href="https://facebook.com/groups/945505587706960/"><i class="fab fa-facebook-f"></i></a>
  </p>
</div>

<!-- Scripts -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  const apiBaseUrl = 'https://nupac.koyeb.app/api/todos';

  // Redirect if not logged in
  if (sessionStorage.getItem('logged_in') !== 'true') {
    window.location.href = 'admin_login.html';
  }

  // Logout
  document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.removeItem('logged_in');
    window.location.href = 'home.html';
  });

  // Load documents
  window.onload = fetchDocuments;

  // Fetch documents
  function fetchDocuments() {
    fetch(apiBaseUrl)
      .then(res => res.json())
      .then(data => {
        const list = document.getElementById('document-list');
        list.innerHTML = '';
        data.todos.forEach(doc => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${doc.title}</td>
            <td>${doc.subject_name}</td>
            <td>${doc.course_name}</td>
            <td><a href="${doc.link}" target="_blank">View</a></td>
            <td>
              <button class="btn btn-warning btn-sm" onclick="editDocument(${doc.id})">Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteDocument(${doc.id})">Delete</button>
            </td>
          `;
          list.appendChild(row);
        });
      });
  }

  // Upload document
  document.getElementById('upload-form').addEventListener('submit', function(e) {
    e.preventDefault();
    const data = {
      title: document.getElementById('title').value,
      subject_name: document.getElementById('subject_name').value,
      course_name: document.getElementById('course_name').value,
      link: document.getElementById('link').value
    };
    fetch(apiBaseUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(res => {
      alert(res.message);
      fetchDocuments();
      this.reset();
    });
  });

  // Edit
  function editDocument(id) {
    const title = prompt("New title:");
    const subject = prompt("New subject:");
    const course = prompt("New course code:");
    const link = prompt("New link:");
    fetch(`${apiBaseUrl}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, subject_name: subject, course_name: course, link })
    })
    .then(res => res.json())
    .then(res => {
      alert(res.message);
      fetchDocuments();
    });
  }

  // Delete
  function deleteDocument(id) {
    if (confirm("Delete this document?")) {
      fetch(`${apiBaseUrl}/${id}`, { method: 'DELETE' })
        .then(res => res.json())
        .then(res => {
          alert(res.message);
          fetchDocuments();
        });
    }
  }

  // Live search
  $('#search').on('keyup', function () {
    const value = $(this).val().toLowerCase();
    $('#document-list tr').filter(function () {
      $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1);
    });
  });
</script>

</body>
</html>
