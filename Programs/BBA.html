            { title: "MGT-141 Introduction to Business", link: "https://drive.google.com/drive/folders/10yqgIzX4EGIdjji19MDcAtcSSwOX1Bis" },  
            { title: "GEN-106 Islamic Studies", link: "https://drive.google.com/drive/folders/140noKQcPDDDMowxZUkjl2km_dvBK7TDw" },  
            { title: "GEN-101 Functional English", link: "https://drive.google.com/drive/folders/1U9BehtaiEri43x9E4LaKhiFPvu7IR1m3https://drive.google.com/drive/folders/12LEgdm8gr-wBPWd1JfECI83f-6InetZY" },  
            { title: "GEN-102 Quantitative Reasoning-1", link: "https://drive.google.com/drive/folders/1-qX5d5adl7s8SK8cFFeUrF9ak7sEuDe3" },

        ],  
        "2nd Semester": [  
            { title: "GEN-104 Expository Writing", link: "https://drive.google.com/drive/folders/1VRvks1tB9Zz8aLd3SeuY8Jjxhl3M2T9N" },  
            { title: "GEN-105 Quantitative Reasoning- II", link: "https://drive.google.com/drive/folders/1lZZXPqjGl8QZrVPcDejVnCBUARNIPhOs" },

            { title: "GEN-109 Sociology", link: "https://drive.google.com/drive/folders/1MiT9pVo_LmowrUWteVwuMcB12zTeECdW" },

        ]  
    };  
  
    document.getElementById("pageTitle").innerText = `${program} - NUP Affiliated Colleges`;  
    const contentDiv = document.getElementById("content");  
      
    Object.keys(semesters).forEach(semester => {  
        let semesterHTML = `<h1>${program} ${semester}</h1>`;  
        semesters[semester].forEach(subject => {  
            semesterHTML += `  
            <div class="folder-item" onclick="openFolder('${subject.link}')">  
                <div class="folder-icon"></div>  
                <div class="folder-title">${subject.title}</div>  
                <a href="${subject.link}" class="download-button" target="_blank">Go to Folder</a>  
            </div>`;  
        });  
        contentDiv.innerHTML += semesterHTML;  
    });  
  
    function openFolder(url) {  
        window.open(url, '_blank');  
    }  
</script>  </body>
